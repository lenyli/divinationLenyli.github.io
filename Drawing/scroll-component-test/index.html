<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>程序化卷轴组件测试</title>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px 18px;
      color: #efe1ba;
      font-family: "Songti SC", "Noto Serif SC", serif;
      background:
        radial-gradient(circle at 50% 44%, rgba(157, 97, 49, .16), transparent 34%),
        linear-gradient(145deg, #16100c, #090706 70%);
    }
    main { width: min(920px, 100%); }
    h1 { margin: 0 0 8px; text-align: center; font-size: clamp(24px, 4vw, 38px); letter-spacing: .12em; }
    .intro { margin: 0 0 36px; text-align: center; color: #ad9a73; }
    .stage {
      min-height: 390px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid rgba(211, 169, 91, .23);
      border-radius: 24px;
      background: radial-gradient(ellipse at center, rgba(106, 68, 37, .22), transparent 65%);
      box-shadow: inset 0 0 70px rgba(0, 0, 0, .48);
    }
    programmatic-scroll {
      width: min(780px, 94vw);
      --scroll-height: 270px;
      --scroll-paper-color: #e8d09b;
      --scroll-ink-color: #5f2a22;
      --scroll-rod-color: #7c311e;
      --scroll-gold-color: #d3a34d;
      --scroll-paper-image: url("../art/签文背景1.png");
      --scroll-roll-image: url("../art/closed-scroll-plain.png");
    }
    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 14px;
      align-items: center;
      margin-top: 22px;
      padding: 16px 18px;
      border: 1px solid rgba(211, 169, 91, .2);
      border-radius: 16px;
      background: rgba(30, 22, 16, .82);
    }
    label { color: #cbb98f; }
    input { width: 100%; accent-color: #b77932; }
    output { min-width: 4.2em; font-variant-numeric: tabular-nums; color: #f2d28e; }
    button {
      padding: 9px 16px;
      border: 1px solid #9e6d35;
      border-radius: 999px;
      color: #f2d69b;
      font: inherit;
      cursor: pointer;
      background: linear-gradient(#5d3520, #392014);
    }
    button:hover { filter: brightness(1.14); }
    .notes { margin: 22px auto 0; max-width: 700px; color: #9d8d70; font-size: 14px; line-height: 1.8; }
    code { color: #d8b976; }
    @media (max-width: 620px) {
      .stage { min-height: 310px; }
      programmatic-scroll { --scroll-height: 210px; }
      .controls { grid-template-columns: auto 1fr auto; }
      button { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main>
    <h1>卷轴开闭组件</h1>
    <p class="intro">复用现有竹简素材，纸面遮罩、卷轴头位移与卷径变化仍由同一个 progress 驱动</p>

    <section class="stage" aria-label="卷轴组件预览">
      <programmatic-scroll id="scroll" progress="0.72" aria-label="梵天神策卷轴">
        <span slot="title">梵 天 神 策</span>
        <span slot="body">静心 · 敬意 · 观照</span>
      </programmatic-scroll>
    </section>

    <div class="controls">
      <label for="progress">开合</label>
      <input id="progress" type="range" min="0" max="1" step="0.001" value="0.72">
      <output id="value" for="progress">0.720</output>
      <button id="toggle" type="button">自动开合</button>
    </div>

    <p class="notes">
      复用时加载 <code>programmatic-scroll.js</code>，使用
      <code>&lt;programmatic-scroll progress="0.5"&gt;</code>。也可在脚本中设置
      <code>element.progress</code>，或调整页面中的 CSS 变量。
    </p>
  </main>

  <script type="module" src="./programmatic-scroll.js"></script>
  <script type="module">
    const scroll = document.querySelector('#scroll');
    const slider = document.querySelector('#progress');
    const value = document.querySelector('#value');
    const toggle = document.querySelector('#toggle');
    let animation = 0;

    const render = progress => {
      const next = Math.min(1, Math.max(0, Number(progress)));
      scroll.progress = next;
      slider.value = next;
      value.value = next.toFixed(3);
    };

    slider.addEventListener('input', () => {
      cancelAnimationFrame(animation);
      animation = 0;
      toggle.textContent = '自动开合';
      render(slider.value);
    });

    toggle.addEventListener('click', () => {
      if (animation) {
        cancelAnimationFrame(animation);
        animation = 0;
        toggle.textContent = '自动开合';
        return;
      }
      const startedAt = performance.now();
      const duration = 4200;
      toggle.textContent = '暂停';
      const tick = now => {
        const phase = ((now - startedAt) % duration) / duration;
        render((1 - Math.cos(phase * Math.PI * 2)) / 2);
        animation = requestAnimationFrame(tick);
      };
      animation = requestAnimationFrame(tick);
    });
  </script>
</body>
</html>
